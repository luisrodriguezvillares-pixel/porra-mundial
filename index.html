header h1{margin:0;text-shadow:0 3px 12px #000;font-size:42px}
nav{display:flex;gap:10px;align-items:center;background:#0b1f3a;padding:12px 25px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
button{background:#1d4ed8;color:white;border:0;border-radius:8px;padding:10px 14px;cursor:pointer}
button:disabled{background:#475569;cursor:not-allowed}
.active,.faseActiva{background:#38bdf8!important;color:#00111f!important}
.user{margin-left:auto;font-weight:bold}
.container{max-width:1200px;margin:auto;padding:25px}
.card{background:#0f2a4a;border:1px solid #1e40af;border-radius:16px;padding:20px;margin:18px 0;box-shadow:0 8px 20px #0005}
input,select{background:#071a33;color:white;border:1px solid #3b82f6;border-radius:8px;padding:8px;margin:4px}
input:disabled,select:disabled{opacity:.55}
.score{width:55px}
.match{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:8px 0}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:15px}
.stat{background:#102f55;border:1px solid #2563eb;border-radius:14px;padding:18px;text-align:center}
.big{font-size:25px;font-weight:bold;color:#7dd3fc}
table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #1e40af;padding:12px;text-align:left}
th{background:#1e3a8a;color:white;text-transform:uppercase;letter-spacing:1px}
footer{text-align:center;padding:25px;color:#93c5fd}
.table-wrap{overflow-x:auto}
.error-box{max-width:700px;margin:50px auto;background:#7f1d1d;color:white;padding:24px;border-radius:14px}
.form-message{display:none;margin:15px 0;padding:12px;border-radius:8px;background:#7f1d1d;color:white}
.ok{color:#86efac;font-weight:bold}

async function cargarDatosCompartidos(){
 if(!usuarioActual)return;

 const [perfiles,misApuestas,resultados]=await Promise.all([
   supabaseClient.from("profiles").select("id,apodo,estado,is_admin"),
   supabaseClient.from("bets").select("key,value").eq("user_id",usuarioActual.id),
   supabaseClient.from("results").select("key,value")
 ]);

 const error=perfiles.error||misApuestas.error||resultados.error;
 if(error)throw error;

 usuariosCache=Object.fromEntries(
   (perfiles.data||[]).map(u=>[u.id,u])
 );
 apuestasCache={
   [usuarioActual.id]:Object.fromEntries(
     (misApuestas.data||[]).map(a=>[a.key,a.value])
   )
 };
 resultadosCache=Object.fromEntries(
   (resultados.data||[]).map(r=>[r.key,r.value])
 );

 const clasificacion=await supabaseClient.rpc("get_leaderboard");
 clasificacionCache=clasificacion.error
   ? (perfiles.data||[])
       .filter(u=>!u.is_admin)
       .map((u,i)=>({...u,correo:u.id,puntos:0,posicion:i+1}))
   : (clasificacion.data||[]).map(u=>({...u,correo:u.id}));
}

async function cargarUsuarioSesion(){
 const {data:{session}}=await supabaseClient.auth.getSession();
 if(!session)return false;

 const perfilCreado=await supabaseClient.rpc("ensure_my_profile");
 if(perfilCreado.error)throw perfilCreado.error;

 const {data:perfil,error}=await supabaseClient
   .from("profiles")
   .select("id,apodo,estado,is_admin")
   .eq("id",session.user.id)
   .single();

 if(error)throw error;

 usuarioActual={
   id:perfil.id,
   correo:perfil.id,
   email:session.user.email,
   apodo:perfil.apodo,
   estado:perfil.estado||"Activo",
   admin:Boolean(perfil.is_admin)
 };
 await cargarDatosCompartidos();
 return true;
}

 const partes=fecha.toLowerCase().split(" ");
 const dia=Number(partes.find(x=>/^\d+$/.test(x)));
 const mesNombre=partes.find(x=>meses[x]!==undefined)||"junio";
 const mes=meses[mesNombre];
 const hm=hora.split(":").map(Number);
 return new Date(2026,mes,dia,hm[0],hm[1]);
}

function formatearCierre(fecha){
 const dia=fecha.getDate();
 const mes="junio";
 const h=String(fecha.getHours()).padStart(2,"0");
 const m=String(fecha.getMinutes()).padStart(2,"0");
 return `${dia} ${mes} a las ${h}:${m}`;
}

function cierrePartido(p){
 const inicio=fechaHoraObj(p[3],p[4]);
 return new Date(inicio.getTime()-2*60*60*1000);
}

function partidoForzadoAbierto(key){
 return localStorage.getItem("override-partido-"+key)==="abierto";
}

function partidoCerrado(p){
 const key=keyPartido(p);
 if(partidoForzadoAbierto(key)) return false;
 return new Date()>=cierrePartido(p);
}

async function setApuesta(k,v){
 if(!usuarioActual || usuarioActual.admin)return;
 apuestasCache[usuarioActual.id]??={};
 apuestasCache[usuarioActual.id][k]=String(v);

 const {error}=await supabaseClient.from("bets").upsert({
   user_id:usuarioActual.id,
   key:k,
   value:String(v)
 },{onConflict:"user_id,key"});

 if(error)alert("No se pudo guardar la apuesta: "+error.message);
}

async function guardarApuestasPantalla(){
 const campos=[...document.querySelectorAll("[data-bet-key]")];
 for(const campo of campos){
   if(campo.disabled)continue;
   await setApuesta(campo.dataset.betKey,campo.value);
 }
 alert("Apuestas guardadas correctamente");
}

function getApuesta(k){
 if(!usuarioActual)return "";
 return apuestas()?.[usuarioActual.id]?.[k]||"";
}

async function setResultado(k,v){
 if(!usuarioActual?.admin)return;
 resultadosCache[k]=String(v);

 const {error}=await supabaseClient.rpc("save_result",{
   result_key:k,
   result_value:String(v)
 });

 if(error){
   alert("No se pudo guardar el resultado: "+error.message);
   return;
 }

 const clasificacion=await supabaseClient.rpc("get_leaderboard");
 if(!clasificacion.error){
   clasificacionCache=(clasificacion.data||[]).map(u=>({...u,correo:u.id}));
 }
}

async function guardarResultadosPantalla(){
 const campos=[...document.querySelectorAll("[data-result-key]")];
 for(const campo of campos){
   if(campo.disabled)continue;
   await setResultado(campo.dataset.resultKey,campo.value);
 }
 alert("Resultados guardados correctamente");
}

function getResultado(k){
 return resultadosCache[k]||"";
}

function togglePartido(key){
 const actual=localStorage.getItem("override-partido-"+key);
 if(actual==="abierto")localStorage.removeItem("override-partido-"+key);
 else localStorage.setItem("override-partido-"+key,"abierto");
 render();
}

async function registrar(){
 let apodo=document.getElementById("regApodo").value.trim();
 let correo=document.getElementById("regCorreo").value.trim().toLowerCase();
 let pass=document.getElementById("regPass").value.trim();

 if(!apodo||!correo||!pass){
   alert("Rellena apodo, correo y contraseña");
   return;
 }

 const {data,error}=await supabaseClient.auth.signUp({
   email:correo,
   password:pass,
   options:{data:{apodo}}
 });

 if(error){
   alert("No se pudo crear la cuenta: "+error.message);
   return;
 }

 if(!data.session){
   alert("Cuenta creada. Revisa tu correo para confirmarla y después inicia sesión.");
   return;
 }

 await cargarUsuarioSesion();
 pantalla=usuarioActual.admin?"resultados":"inicio";
 render();
}

async function iniciarSesion(){
 let login=document.getElementById("loginCorreo").value.trim().toLowerCase();
 let pass=document.getElementById("loginPass").value.trim();
 const mensaje=document.getElementById("loginMensaje");
 const boton=document.getElementById("loginBoton");

 if(!login||!pass){
   mensaje.textContent="Escribe tu correo y contraseña.";
   mensaje.style.display="block";
   return;
 }

 mensaje.style.display="none";
 boton.disabled=true;
 boton.textContent="Entrando...";

 try{
   const {error}=await supabaseClient.auth.signInWithPassword({
     email:login,
     password:pass
   });

   if(error)throw error;

   await cargarUsuarioSesion();
   pantalla=usuarioActual.admin?"resultados":"inicio";
   render();
 }catch(error){
   mensaje.textContent="No se pudo iniciar sesión: "+String(error.message||error);
   mensaje.style.display="block";
   boton.disabled=false;
   boton.textContent="Entrar a la Porra";
 }
}

async function enviarRecuperacionPassword(){
 const login=document.getElementById("loginCorreo").value.trim().toLowerCase();
 const mensaje=document.getElementById("loginMensaje");

 if(!login){
   mensaje.textContent="Escribe tu correo arriba y pulsa de nuevo.";
   mensaje.style.display="block";
   return;
 }

 const {error}=await supabaseClient.auth.resetPasswordForEmail(login,{
   redirectTo:APP_URL+"?recovery=1"
 });

 if(error){
   mensaje.textContent="No se pudo enviar el correo: "+error.message;
   mensaje.style.display="block";
   return;
 }

 mensaje.style.background="#166534";
 mensaje.textContent="Te hemos enviado un correo para cambiar la contraseña.";
 mensaje.style.display="block";
}

async function cambiarPasswordNueva(){
 const pass=document.getElementById("newPass").value.trim();
 const pass2=document.getElementById("newPass2").value.trim();
 const mensaje=document.getElementById("recoverMensaje");

 if(pass.length<6){
   mensaje.textContent="La contraseña debe tener al menos 6 caracteres.";
   mensaje.style.display="block";
   return;
 }

 if(pass!==pass2){
   mensaje.textContent="Las contraseñas no coinciden.";
   mensaje.style.display="block";
   return;
 }

 const {error}=await supabaseClient.auth.updateUser({password:pass});

 if(error){
   mensaje.textContent="No se pudo cambiar la contraseña: "+error.message;
   mensaje.style.display="block";
   return;
 }

 mensaje.style.background="#166534";
 mensaje.textContent="Contraseña cambiada. Ya puedes iniciar sesión.";
 mensaje.style.display="block";

 setTimeout(async()=>{
   await supabaseClient.auth.signOut();
   modoRecuperarPassword=false;
   pantalla="login";
   render();
 },1200);
}

async function salir(){
 mostrarTransicion("salir");
 setTimeout(async()=>{
   await supabaseClient.auth.signOut();
   usuarioActual=null;
   usuariosCache={};
   apuestasCache={};
   resultadosCache={};
   clasificacionCache=[];
   pantalla="login";
   render();
 },950);
}

function mostrarTransicion(destino){
 const overlay=document.getElementById("transitionOverlay");
 if(overlay){
   const imagen=overlay.querySelector("img");
   const texto=overlay.querySelector(".transition-card div");
   const usarColor=destino==="partidos" || destino==="apostar";
   const mensajes={
     inicio:"EE. UU., México y Canadá 2026",
     partidos:"Canción del Mundial: ¡Dai Dai!",
     apostar:"48 países, un trofeo",
     mis:"3 países anfitriones, 104 partidos en 39 días",
     clasificacion:"Lucha por la gloria",
     perfil:"Tu identidad mundialista",
     salir:"Nos vemos pronto"
   };
   imagen.src=usarColor?IMAGEN_MUNDIAL_COLOR:IMAGEN_MUNDIAL_NEGRA;
   texto.textContent=mensajes[destino]||"Mundial 2026";
   overlay.classList.add("show");
 }
}

function cambiarPantalla(destino){
 if(destino===pantalla)return;
 mostrarTransicion(destino);
 setTimeout(()=>{
   pantalla=destino;
   render();
 },950);
}

async function guardarPerfil(){
 const input=document.getElementById("perfilApodo");
 const mensaje=document.getElementById("perfilMensaje");
 const nuevoApodo=input.value.trim();

 if(!nuevoApodo){
   mensaje.textContent="Escribe un nombre de usuario.";
   mensaje.style.display="block";
   return;
 }

 if(nuevoApodo.length>30){
   mensaje.textContent="El nombre no puede tener más de 30 caracteres.";
   mensaje.style.display="block";
   return;
 }

 const {error}=await supabaseClient
   .from("profiles")
   .update({apodo:nuevoApodo})
   .eq("id",usuarioActual.id);

 if(error){
   mensaje.textContent="No se pudo cambiar el nombre: "+error.message;
   mensaje.style.display="block";
   return;
 }

 usuarioActual.apodo=nuevoApodo;
 await cargarDatosCompartidos();
 mensaje.textContent="Nombre cambiado correctamente.";
 mensaje.style.display="block";
 mensaje.style.background="#166534";
 setTimeout(()=>render(),700);
}

function partidosDeFase(fase){
 return partidosGrupo.filter(p=>p[0]===fase);
}

function vistaApostar(){
 let html=`<h2>⚽ Apostar</h2>${tabsFases()}`;
 let partidosFase=partidosDeFase(faseApuesta);

 if(partidosFase.length){
   html+=`
   <div class="card">
   <h3>${faseApuesta}</h3>
   <p>Introduce tus pronósticos. Cada partido se cierra 2 horas antes.</p>`;

   partidosFase.forEach(p=>{
     let k=keyPartido(p);
     let cerrado=partidoCerrado(p);
     html+=`
     <div class="match">
     <span style="color:#93c5fd;font-weight:bold;min-width:190px">${p[3]} - ${p[4]}</span>
     <b>${p[1]}</b>
     <input class="score" type="number" min="0" data-bet-key="${k}-local" ${cerrado?"disabled":""}
     value="${getApuesta(k+'-local')}" onchange="setApuesta('${k}-local',this.value)">
     -
     <input class="score" type="number" min="0" data-bet-key="${k}-visitante" ${cerrado?"disabled":""}
     value="${getApuesta(k+'-visitante')}" onchange="setApuesta('${k}-visitante',this.value)">
     <b>${p[2]}</b>
     <span style="color:#fbbf24">${p[5]||""}</span>
     ${cerrado?'<span class="closed">🔒 Cerrado</span>':'<span class="ok">🟢 Abierto</span>'}
     </div>`;
   });

   html+=`</div>`;
 }
 else{
   html+=`
   <div class="card">
   <h2>${faseApuesta}</h2>

 }

 html+=`<button onclick="guardarApuestasPantalla()">Guardar todo</button>`;
 return layout(html);
}

 fases.forEach(f=>{
   const partidosFase=partidosDeFase(f);
   if(!partidosFase.length)return;

   html+=`<div class="card"><h3>${f}</h3>`;

   partidosFase.forEach(p=>{
     let k=keyPartido(p);
     html+=`<p>${p[1]} ${getApuesta(k+'-local')||"_"} - ${getApuesta(k+'-visitante')||"_"} ${p[2]} <span style="color:#93c5fd">(${p[3]} - ${p[4]})</span> <span style="color:#fbbf24">${p[5]||""}</span></p>`;
   });

   html+=`</div>`;
 });

 return layout(html);
}

 return clasificacionCache.find(u=>u.id===correo || u.correo===correo)?.puntos||0;

function render(){
 const root=document.getElementById("app");

 if(!root){
   alert("No se encuentra el contenedor app");
   return;
 }

 if(modoRecuperarPassword){
   root.innerHTML=vistaRecuperarPassword();
   return;
 }

 if(!usuarioActual){
   root.innerHTML=vistaLogin();
   return;
 }

 if(pantalla==="inicio")root.innerHTML=vistaInicio();
 if(pantalla==="partidos")root.innerHTML=vistaPartidos();
 if(pantalla==="apostar")root.innerHTML=vistaApostar();
 if(pantalla==="mis")root.innerHTML=vistaMis();
 if(pantalla==="clasificacion")root.innerHTML=vistaClasificacion();
 if(pantalla==="perfil")root.innerHTML=vistaPerfil();
 if(pantalla==="resultados")root.innerHTML=vistaResultados();
 if(pantalla==="habilitar")root.innerHTML=vistaHabilitar();
}

async function iniciarAplicacion(){
 try{
   const hashParams=new URLSearchParams(window.location.hash.replace(/^#/,""));
   const queryParams=new URLSearchParams(window.location.search);
   const tipo=hashParams.get("type")||queryParams.get("type");
   const code=queryParams.get("code");
   const esRecuperacion=tipo==="recovery" || queryParams.get("recovery")==="1";

   if(esRecuperacion && code){
     const {error}=await supabaseClient.auth.exchangeCodeForSession(code);
     if(error)throw error;
     modoRecuperarPassword=true;
     mensajeRecuperacionInicial="Enlace verificado. Escribe tu nueva contraseña.";
     history.replaceState({},document.title,APP_URL);
     render();
     return;
   }

   if(esRecuperacion){
     modoRecuperarPassword=true;
     render();
     return;
   }

   const haySesion=await cargarUsuarioSesion();
   if(haySesion){
     pantalla=usuarioActual.admin?"resultados":"inicio";
   }
   render();
 }catch(error){
   console.error(error);
   const root=document.getElementById("app");
   root.innerHTML=`
   <div class="error-box">
    <h2>Falta activar la base de datos</h2>
    <p>La página ya está conectada a Supabase, pero todavía hay que ejecutar el archivo de configuración SQL.</p>
    <p>${String(error.message||error)}</p>
   </div>`;
 }
}

iniciarAplicacion();
</script>
