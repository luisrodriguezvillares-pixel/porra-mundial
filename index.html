<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial 2026</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#06152b;color:#eaf2ff}
header{background:#020817;padding:20px 30px;border-bottom:1px solid #1d4ed8}
nav{display:flex;gap:10px;align-items:center;background:#0b1f3a;padding:12px 25px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
button{background:#1d4ed8;color:white;border:0;border-radius:8px;padding:10px 14px;cursor:pointer}
button:disabled{background:#475569;cursor:not-allowed}
.active,.faseActiva{background:#38bdf8!important;color:#00111f!important}
.user{margin-left:auto;font-weight:bold}
.container{max-width:1200px;margin:auto;padding:25px}
.card{background:#0f2a4a;border:1px solid #1e40af;border-radius:16px;padding:20px;margin:18px 0;box-shadow:0 8px 20px #0005}
input,select{background:#071a33;color:white;border:1px solid #3b82f6;border-radius:8px;padding:8px;margin:4px}
input:disabled,select:disabled{opacity:.55}
.score{width:55px}
.match{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:8px 0}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:15px}
.stat{background:#102f55;border:1px solid #2563eb;border-radius:14px;padding:18px;text-align:center}
.big{font-size:25px;font-weight:bold;color:#7dd3fc}
table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #1e40af;padding:12px;text-align:left}
th{background:#1e3a8a;color:white;text-transform:uppercase;letter-spacing:1px}
footer{text-align:center;padding:25px;color:#93c5fd}
.table-wrap{overflow-x:auto}
.error-box{max-width:700px;margin:50px auto;background:#7f1d1d;color:white;padding:24px;border-radius:14px}
.ok{color:#86efac;font-weight:bold}
.closed{color:#f87171;font-weight:bold}
.warn{color:#fbbf24;font-weight:bold}
@media(max-width:800px){
 .grid{grid-template-columns:1fr}
 .user{margin-left:0}
 h1{font-size:34px!important}
 .container{padding:15px}
 td,th{padding:9px}
}
</style>
</head>

<div id="app">

    <p>Se ha producido un error al cargar el código.</p>
    <p>${String(event.message||"Error desconocido")}</p>
   </div>`;
 }
});
</script>

function safeJSON(key, fallback){
 try{
   return JSON.parse(localStorage.getItem(key)||fallback);
 }catch(e){
   return JSON.parse(fallback);
 }
}

function keyPartido(p){return p[0]+"-"+p[1]+"-"+p[2]}

function fechaHoraObj(fecha,hora){
 const meses={junio:5};
 const partes=fecha.split(" ");
 const dia=Number(partes[0]);
 const mes=meses[partes[1].toLowerCase()];
 const hm=hora.split(":").map(Number);
 return new Date(2026,mes,dia,hm[0],hm[1]);
}

function formatearCierre(fecha){
 const dia=fecha.getDate();
 const mes="junio";
 const h=String(fecha.getHours()).padStart(2,"0");
 const m=String(fecha.getMinutes()).padStart(2,"0");
 return `${dia} ${mes} a las ${h}:${m}`;
}

function cierrePartido(p){
 const inicio=fechaHoraObj(p[3],p[4]);
 return new Date(inicio.getTime()-2*60*60*1000);
}

function partidoForzadoAbierto(key){
 return localStorage.getItem("override-partido-"+key)==="abierto";
}

function tablaForzadaAbierta(grupo){
 return localStorage.getItem("override-tabla-"+grupo)==="abierta";
}

function partidoCerrado(p){
 const key=keyPartido(p);
 if(partidoForzadoAbierto(key)) return false;
 return new Date()>=cierrePartido(p);
}

function primerPartidoGrupo(grupo){
 return partidosGrupo.filter(p=>p[0]===grupo)
 .sort((a,b)=>fechaHoraObj(a[3],a[4])-fechaHoraObj(b[3],b[4]))[0];
}

function cierreTablaGrupo(grupo){
 const p=primerPartidoGrupo(grupo);
 const inicio=fechaHoraObj(p[3],p[4]);
 return new Date(inicio.getTime()-2*60*60*1000);
}

function tablaGrupoCerrada(grupo){
 if(tablaForzadaAbierta(grupo)) return false;
 return new Date()>=cierreTablaGrupo(grupo);
}

function registrar(){
 let apodo=document.getElementById("regApodo").value.trim();
 let correo=document.getElementById("regCorreo").value.trim().toLowerCase();
 let pass=document.getElementById("regPass").value.trim();

 if(!apodo||!correo||!pass){
   alert("Rellena apodo, correo y contraseña");
   return;
 }

 let d=usuarios();

 if(d[correo]){
   alert("Ya existe una cuenta con ese correo.");
   return;
 }

 d[correo]={
   apodo:apodo,
   correo:correo,
   pass:pass,
   puntos:0,
   estado:"Activo"
 };

 guardarUsuarios(d);

 usuarioActual=d[correo];
 localStorage.setItem("usuarioActual",JSON.stringify(usuarioActual));
 pantalla="inicio";
 render();
}

function iniciarSesion(){
 let login=document.getElementById("loginCorreo").value.trim().toLowerCase();
 let pass=document.getElementById("loginPass").value.trim();

 if(login===ADMIN_EMAIL.toLowerCase() && pass===ADMIN_PASSWORD){
   usuarioActual={
     apodo:"Admin",
     correo:ADMIN_EMAIL,
     admin:true,
     estado:"Administrador",
     puntos:0
   };

   localStorage.setItem("usuarioActual",JSON.stringify(usuarioActual));
   pantalla="resultados";
   render();
   return;
 }

 let d=usuarios();
 let encontrado=null;

 for(let correo in d){
   let u=d[correo];

   if(
     (
       correo.toLowerCase()===login ||
       String(u.apodo||"").toLowerCase()===login
     )
     &&
     String(u.pass).trim()===pass
   ){
     encontrado=u;
     break;
   }
 }

 if(!encontrado){
   alert("No existe esa cuenta en este navegador. Regístrate primero.");
   return;
 }

 usuarioActual=encontrado;
 localStorage.setItem("usuarioActual",JSON.stringify(usuarioActual));
 pantalla="inicio";
 render();
}

function salir(){
 localStorage.removeItem("usuarioActual");
 usuarioActual=null;
 pantalla="login";
 render();
}

     let k=keyPartido(p);
     let cerrado=partidoCerrado(p);
     html+=`
     <div class="match">
     <b>${p[1]}</b>
     <input class="score" type="number" min="0" ${cerrado?"disabled":""}
     value="${getApuesta(k+'-local')}" onchange="setApuesta('${k}-local',this.value)">
     -
     <input class="score" type="number" min="0" ${cerrado?"disabled":""}
     value="${getApuesta(k+'-visitante')}" onchange="setApuesta('${k}-visitante',this.value)">
     <b>${p[2]}</b>
     <span style="color:#93c5fd">(${p[3]} - ${p[4]})</span>
     ${cerrado?'<span class="closed">🔒 Cerrado</span>':'<span class="ok">🟢 Abierto</span>'}
     </div>`;
   });

   html+=`</div><div><h4>Tabla final del grupo</h4>`;

   for(let pos=1;pos<=4;pos++){
     html+=`${pos}º <select ${tablaCerrada?"disabled":""} onchange="setApuesta('${grupoActual}-pos${pos}',this.value)">
     <option value="">Seleccionar</option>
     ${equipos.map(x=>`<option ${getApuesta(grupoActual+'-pos'+pos)===x?'selected':''}>${x}</option>`).join("")}
     </select><br>`;
   }

   html+=`</div></div></div>`;
 }

 else if(faseApuesta==="Mejores terceros"){
   let terceros=tercerosSeleccionados();

   html+=`
   <div class="card">
   <h3>Mejores terceros</h3>
   <p>Selecciona los 8 terceros que crees que pasarán a dieciseisavos.</p>
   <p>Solo aparecen equipos que hayas puesto como 3º en algún grupo.</p>
   </div>`;

   for(let i=1;i<=8;i++){
     html+=`
     <div class="card">
     <h3>${i}º mejor tercero</h3>
     <select onchange="setApuesta('mejor-tercero-${i}',this.value)">
     <option value="">Seleccionar</option>
     ${terceros.map(t=>`<option ${getApuesta('mejor-tercero-'+i)===t?'selected':''}>${t}</option>`).join("")}
     </select>
     </div>`;
   }
 }

 else{
   html+=`
   <div class="card">
   <h2>${faseApuesta}</h2>
   <div style="background:#172554;border:1px solid #3b82f6;padding:25px;border-radius:12px;text-align:center">
   <h3>🚧 Próximamente</h3>
   <p>No disponible todavía.</p>
   <p>Esta fase se activará cuando termine la fase de grupos y se conozcan los clasificados.</p>
   </div>
   </div>`;
 }

 html+=`<button onclick="alert('Apuestas guardadas automáticamente')">Guardar todo</button>`;
 return layout(html);
}

function calcularPuntosUsuario(correo){
 let total=0;
 let d=apuestas();

 partidosGrupo.forEach(p=>{
   let k=keyPartido(p);

   let apLocal=d?.[correo]?.[k+"-local"];
   let apVisit=d?.[correo]?.[k+"-visitante"];

   let realLocal=getResultado(k+"-a");
   let realVisit=getResultado(k+"-b");

   if(realLocal==="" || realVisit==="") return;

   if(apLocal==="" || apLocal===undefined || apVisit==="" || apVisit===undefined){
     total-=2;
     return;
   }

   apLocal=Number(apLocal);
   apVisit=Number(apVisit);
   realLocal=Number(realLocal);
   realVisit=Number(realVisit);

   if(apLocal===realLocal && apVisit===realVisit){
     total+=10;
     return;
   }

   let signoApuesta =
     apLocal>apVisit ? "local" :
     apLocal<apVisit ? "visitante" :
     "empate";

   let signoReal =
     realLocal>realVisit ? "local" :
     realLocal<realVisit ? "visitante" :
     "empate";

   if(signoApuesta===signoReal){
     total+=5;
   }
 });

 return total;
}

function obtenerClasificacionGeneral(){
 return Object.values(usuarios()).map(u=>({
   ...u,
   puntos:calcularPuntosUsuario(u.correo)
 })).sort((a,b)=>
   b.puntos-a.puntos ||
   String(a.apodo||"").localeCompare(String(b.apodo||""),"es")
 );
}
