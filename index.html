footer{text-align:center;padding:25px;color:#93c5fd}

.transition-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#020817;opacity:0;pointer-events:none}
.transition-overlay.show{pointer-events:auto;animation:overlayWorldCup .95s ease both}
.transition-card{text-align:center}

@media(max-width:800px){

function fechaHoraObj(fecha,hora){
 const meses={junio:5,julio:6};
 const partes=fecha.toLowerCase().split(" ");
 const dia=Number(partes.find(x=>/^\d+$/.test(x)));
 const mesNombre=partes.find(x=>meses[x]!==undefined)||"junio";
 const mes=meses[mesNombre];
 const hm=hora.split(":").map(Number);
 return new Date(2026,mes,dia,hm[0],hm[1]);
}

function formatearCierre(fecha){
 const dia=fecha.getDate();
 const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
 const mes=meses[fecha.getMonth()]||"junio";
 const h=String(fecha.getHours()).padStart(2,"0");
 const m=String(fecha.getMinutes()).padStart(2,"0");
 return `${dia} ${mes} a las ${h}:${m}`;
}

function cierrePartido(p){
 const inicio=fechaHoraObj(p[3],p[4]);
 return new Date(inicio.getTime()-1*60*60*1000);
}

function partidoCerrado(p){

 if(partidoForzadoAbierto(key)) return false;
 return new Date()>=cierrePartido(p);
}

function getResultado(k){

function esNumeroEntero(valor){
 return String(valor).trim()!=="" && /^-?\d+$/.test(String(valor).trim());
}

function puntosPorPartido(p){
 const k=keyPartido(p);
 const apLocal=getApuesta(k+"-local");
 const apVisitante=getApuesta(k+"-visitante");
 const realLocal=getResultado(k+"-a");
 const realVisitante=getResultado(k+"-b");

 if(!esNumeroEntero(realLocal) || !esNumeroEntero(realVisitante)){
   return {texto:"-", puntos:null, color:"#38bdf8"};
 }

 if(!esNumeroEntero(apLocal) || !esNumeroEntero(apVisitante)){
   return {texto:"-2 puntos", puntos:-2, color:"#38bdf8"};
 }

 const al=Number(apLocal);
 const av=Number(apVisitante);
 const rl=Number(realLocal);
 const rv=Number(realVisitante);

 if(al===rl && av===rv){
   return {texto:"10 puntos", puntos:10, color:"#38bdf8"};
 }

 if(Math.sign(al-av)===Math.sign(rl-rv)){
   return {texto:"5 puntos", puntos:5, color:"#38bdf8"};
 }

 return {texto:"0 puntos", puntos:0, color:"#38bdf8"};
}

async function guardarResultadoPartido(k){

 const claves=[k+"-a",k+"-b",k+"-prorroga"];
 let guardados=0;

   const campo=campoResultado(clave);
   if(!campo || campo.disabled)continue;
   if(campo.value==="" && getResultado(clave)==="")continue;
   await setResultado(clave,campo.value,true);
   guardados++;
 }
}

async function guardarPerfil(){
 const input=document.getElementById("perfilApodo");
 const mensaje=document.getElementById("perfilMensaje");
 const nuevoApodo=input.value.trim();

 if(!nuevoApodo){
   mensaje.textContent="Escribe un nombre de usuario.";
   mensaje.style.display="block";
   return;
 }

 if(nuevoApodo.length>30){
   mensaje.textContent="El nombre no puede tener más de 30 caracteres.";
   mensaje.style.display="block";
   return;
 }

 const {error}=await supabaseClient
   .from("profiles")
   .update({apodo:nuevoApodo})
   .eq("id",usuarioActual.id);

 if(error){
   mensaje.textContent="No se pudo cambiar el nombre: "+error.message;
   mensaje.style.display="block";
   return;
 }

 usuarioActual.apodo=nuevoApodo;
 await cargarDatosCompartidos();
 mensaje.textContent="Nombre cambiado correctamente.";
 mensaje.style.display="block";
 mensaje.style.background="#166534";
 setTimeout(()=>render(),700);
}

async function iniciarAplicacion(){
 try{
   const hashParams=new URLSearchParams(window.location.hash.replace(/^#/,""));
   const queryParams=new URLSearchParams(window.location.search);
   const tipo=hashParams.get("type")||queryParams.get("type");
   const code=queryParams.get("code");
   const esRecuperacion=tipo==="recovery" || queryParams.get("recovery")==="1";

   if(esRecuperacion && code){
     const {error}=await supabaseClient.auth.exchangeCodeForSession(code);
     if(error)throw error;
     modoRecuperarPassword=true;
     mensajeRecuperacionInicial="Enlace verificado. Escribe tu nueva contraseña.";
     history.replaceState({},document.title,APP_URL);
     render();
     return;
   }

   if(esRecuperacion){
     modoRecuperarPassword=true;
     render();
     return;
   }

   const haySesion=await cargarUsuarioSesion();
   if(haySesion){
     pantalla=usuarioActual.admin?"resultados":"inicio";
   }
   render();
 }catch(error){
   console.error(error);
   const root=document.getElementById("app");
   root.innerHTML=`
   <div class="error-box">
    <h2>Falta activar la base de datos</h2>
    <p>La página ya está conectada a Supabase, pero todavía hay que ejecutar el archivo de configuración SQL.</p>
    <p>${String(error.message||error)}</p>
   </div>`;
 }
}

iniciarAplicacion();
